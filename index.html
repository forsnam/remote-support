<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWAI 고객지원센터 - 원격 접속 설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Malgun Gothic', sans-serif; }
        .setup-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .step-badge { background-color: #0d6efd; color: white; border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; }
        .account-box { background: #f1f3f5; border: 1px dashed #dee2e6; padding: 15px; margin: 15px 0; border-radius: 10px; }
        .btn-start { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; }
        .highlight { color: #d63384; font-weight: bold; }
    </style>
</head>
<body>

<div class="setup-container">
    <div class="text-center mb-4">
        <h2>🛠️ 원격 지원 자동 설정</h2>
        <p class="text-muted">컴맹도 1분이면 끝나는 원격 지원 준비</p>
    </div>

    <div class="mb-4">
        <h5><span class="step-badge">1</span> 자동 설정 도구 다운로드</h5>
        <p>아래 버튼을 눌러 파일을 다운로드한 뒤 <strong>[실행]</strong>해 주세요.</p>
        <button class="btn btn-primary btn-start" onclick="downloadScript()">원격 지원 시작하기 (클릭)</button>
        <small class="text-muted">* 파란색 창이 뜨면 '추가 정보' 클릭 후 '실행'을 눌러주세요.</small>
    </div>

    <div class="mb-4">
        <h5><span class="step-badge">2</span> 구글 로그인 진행</h5>
        <p>새로 열린 크롬 창에서 아래 정보를 입력하세요.</p>
        <div class="account-box">
            아이디: <span class="highlight">rwai.cs1@gmail.com</span><br>
            비밀번호: <span class="highlight">1122334455</span>
        </div>
    </div>

    <div class="mb-4">
        <h5><span class="step-badge">3</span> 원격 액세스 설정</h5>
        <p>화면의 <strong>[사용]</strong> 버튼을 누르고 컴퓨터 이름을 정한 뒤, PIN(비밀번호 6자리)을 입력하면 끝납니다.</p>
    </div>

    <button class="btn btn-outline-success w-100" onclick="sendReport()">모든 설정을 마쳤습니다 (이메일 전송)</button>
</div>

<script>
function downloadScript() {
    // 실제 운영 시에는 setup.ps1 파일을 .exe로 변환하여 링크 연결 권장
    const scriptContent = `
$chromePath = "\${env:ProgramFiles(x86)}\\Google\\Chrome\\Application\\chrome.exe"
if (!(Test-Path $chromePath)) { $chromePath = "\${env:ProgramFiles}\\Google\\Chrome\\Application\\chrome.exe" }
$profilePath = "C:\\RWAI_Support_Profile"
if (!(Test-Path $profilePath)) { New-Item -ItemType Directory -Path $profilePath }
$url = "https://remotedesktop.google.com/access"
Start-Process $chromePath -ArgumentList "--user-data-dir='$profilePath' --start-maximized '$url'"
    `;
    const blob = new Blob([scriptContent], { type: 'text/plain' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'RWAI_Setup.ps1';
    a.click();
}

function sendReport() {
    const pcName = prompt("고객님의 성함을 입력해주세요.");
    if(pcName) {
        window.location.href = `mailto:rwai.cs1@gmail.com?subject=[원격설정완료] \${pcName} 고객님&body=방금 \${pcName} 고객님의 원격 설정이 완료되었습니다. 확인 후 접속해 주세요.`;
    }
}
</script>

</body>
</html>
