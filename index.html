<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWAI 원격 지원센터</title>
    <style>
        :root { --primary: #0078d4; --bg: #f3f2f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; width: 90%; max-width: 500px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #323130; font-size: 24px; margin-bottom: 20px; }
        .step { text-align: left; background: #faf9f8; border-radius: 8px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--primary); }
        .step h3 { margin-top: 0; font-size: 16px; color: var(--primary); }
        .info-box { background: #fff4ce; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 14px; margin: 10px 0; color: #444; border: 1px solid #f2e3b3; }
        .btn { display: block; width: 100%; background: var(--primary); color: white; text-decoration: none; padding: 15px; border-radius: 6px; font-weight: bold; margin-top: 20px; transition: 0.2s; border: none; cursor: pointer; }
        .btn:hover { background: #005a9e; }
        small { color: #605e5c; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RWAI 원격 지원 시작하기</h1>
        
        <div class="step">
            <h3>1. 설정 도구 준비</h3>
            <p>아래 버튼을 눌러 파일을 받고 실행해 주세요.</p>
            <button class="btn" onclick="downloadSetup()">설정 파일 다운로드</button>
        </div>

        <div class="step">
            <h3>2. 전용 계정 로그인</h3>
            <p>새로 열린 크롬 창에서 아래 계정으로 로그인하세요.</p>
            <div class="info-box">
                ID: rwai.cs1@gmail.com<br>
                PW: 1122334455
            </div>
        </div>

        <div class="step">
            <h3>3. 장기 접속 설정</h3>
            <p>'원격 액세스'의 <strong>[사용]</strong> 버튼을 누르고,<br>비밀번호(PIN)를 <strong>6자리</strong>로 설정해 주세요.</p>
        </div>

        <button class="btn" style="background: #107c10;" onclick="finish()">설정 완료 알림 보내기</button>
        <small>※ 파란색 보안 경고창이 뜨면 [추가 정보] → [실행]을 눌러주세요.</small>
    </div>

    <script>
        function downloadSetup() {
            const script = `@echo off\n` +
                `set "chromePath=C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"\n` +
                `if not exist "%chromePath%" set "chromePath=C:\\Program Files (x86)\\Google\\Chrome\\Application\\chrome.exe"\n` +
                `set "profilePath=C:\\RWAI_Support"\n` +
                `start "" "%chromePath%" --user-data-dir="%profilePath%" --start-maximized "https://remotedesktop.google.com/access"\n` +
                `exit`;
            
            const blob = new Blob([script], { type: 'application/octet-stream' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'RWAI_QuickStart.bat'; // 컴맹 고객도 실행하기 쉬운 배치 파일
            a.click();
        }

        function finish() {
            const name = prompt("고객님의 성함을 입력해 주세요.");
            if(name) {
                window.location.href = `mailto:rwai.cs1@gmail.com?subject=[설정완료] ${name} 고객님&body=${name} 님의 원격 설정이 완료되었습니다. 이제 관리자 창에서 접속 가능합니다.`;
            }
        }
    </script>
</body>
</html>
